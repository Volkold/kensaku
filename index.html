<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<title>納入実績検索</title>
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#142839">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="納入実績">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    color-scheme: light only;
    --ink: #16232E;
    --ink-soft: #4C5C6B;
    --line: #D6DEE5;
    --line-soft: #E7EDF1;
    --paper: #EEF2F5;
    --card: #FFFFFF;
    --navy: #1E3A52;
    --navy-deep: #142839;
    --amber: #C9711A;
    --amber-soft: #F4E3CE;
    --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  body { padding-bottom: 40px; }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 20;
    background: var(--navy-deep);
    background-image: linear-gradient(160deg, var(--navy-deep), var(--navy) 120%);
    padding: 14px 16px 16px;
    padding-top: max(14px, env(safe-area-inset-top));
    box-shadow: 0 2px 10px rgba(10,20,30,0.25);
  }
  .title-row {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 10px;
  }
  h1 {
    font-size: 17px; font-weight: 700; color: #F4F7F9; margin: 0;
    letter-spacing: 0.01em;
  }
  h1 .mark { color: var(--amber); font-family: var(--mono); margin-right: 6px; }
  .count-badge {
    font-family: var(--mono); font-size: 11px; color: #AFC2D1;
    letter-spacing: 0.02em;
  }
  .search-wrap { position: relative; }
  #searchInput {
    width: 100%;
    padding: 11px 40px 11px 14px;
    font-size: 16px;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    outline: none;
  }
  #searchInput::placeholder { color: #9FB2C2; }
  #searchInput:focus { background: rgba(255,255,255,0.14); border-color: var(--amber); }
  .clear-btn {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #9FB2C2; font-size: 20px;
    padding: 4px 8px; cursor: pointer; display: none; line-height: 1;
  }
  .clear-btn.show { display: block; }

  /* Filter toggle */
  .filter-toggle {
    display: flex; align-items: center; gap: 6px;
    margin-top: 10px;
    font-size: 12.5px; color: #C7D6E1;
    background: none; border: none; padding: 4px 2px; cursor: pointer;
  }
  .filter-toggle .chev { transition: transform 0.15s ease; font-size: 10px; }
  .filter-toggle.open .chev { transform: rotate(90deg); }
  .filter-toggle .active-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--amber);
    display: none;
  }
  .filter-toggle.has-active .active-dot { display: inline-block; }

  .filters {
    display: none;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }
  .filters.open { display: grid; }
  .filters label {
    display: block; font-size: 10.5px; color: #9FB2C2;
    margin-bottom: 3px; letter-spacing: 0.03em;
  }
  .filters select {
    width: 100%; padding: 8px 8px; font-size: 13.5px;
    border-radius: 8px; border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.08); color: #fff;
    -webkit-appearance: none; appearance: none;
  }
  .filters select option { color: #16232E; }
  .reset-row { grid-column: 1 / -1; text-align: right; }
  #resetFilters {
    background: none; border: none; color: var(--amber);
    font-size: 12px; padding: 4px 0; cursor: pointer; text-decoration: underline;
  }

  /* Results */
  main { padding: 12px 12px 0; }
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--ink-soft);
  }
  .empty-state .big { font-size: 34px; margin-bottom: 8px; opacity: 0.5; }
  .empty-state p { font-size: 13.5px; line-height: 1.7; margin: 4px 0; }

  .result-meta {
    font-size: 11.5px; color: var(--ink-soft); padding: 2px 4px 10px;
    font-family: var(--mono);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line-soft);
    border-radius: 10px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .card-head {
    display: flex; justify-content: space-between; align-items: center;
    gap: 10px; padding: 11px 13px; cursor: pointer;
  }
  .card-head:active { background: var(--line-soft); }
  .card-main { min-width: 0; flex: 1; }
  .card-serial {
    font-family: var(--mono); font-size: 12px; color: var(--amber);
    font-weight: 700; letter-spacing: 0.02em;
  }
  .card-user {
    font-size: 17px; font-weight: 700; color: var(--ink);
    margin-top: 3px; line-height: 1.3;
    overflow-wrap: break-word; word-break: break-word; white-space: normal;
  }
  .card-machine-row {
    display: flex; align-items: baseline; gap: 8px;
    margin-top: 4px; flex-wrap: wrap;
  }
  .card-machine {
    font-size: 15.5px; font-weight: 700; color: var(--navy);
    overflow-wrap: break-word; word-break: break-word;
  }
  .card-chno {
    font-family: var(--mono); font-size: 14px; font-weight: 700;
    color: #fff; background: var(--navy);
    padding: 2px 8px; border-radius: 6px; flex-shrink: 0;
    white-space: nowrap;
  }
  .card-sub {
    font-size: 12px; color: var(--ink-soft); margin-top: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-year {
    font-family: var(--mono); font-size: 13px; color: var(--navy);
    background: var(--amber-soft); padding: 3px 8px; border-radius: 6px;
    flex-shrink: 0; font-weight: 700;
  }
  .card-detail {
    display: none;
    padding: 4px 13px 13px;
    border-top: 1px dashed var(--line);
  }
  .card-detail.open { display: block; }
  .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px;
    margin-top: 10px;
  }
  .detail-item dt {
    font-size: 10px; color: var(--ink-soft); letter-spacing: 0.03em;
    margin-bottom: 1px; text-transform: uppercase;
  }
  .detail-item dd {
    font-size: 13px; color: var(--ink); margin: 0;
    font-family: var(--mono); word-break: break-word;
  }

  .load-more {
    display: block; width: 100%; padding: 12px;
    background: var(--card); border: 1px dashed var(--line);
    border-radius: 10px; color: var(--navy); font-size: 13.5px;
    font-weight: 600; margin: 6px 0 16px; cursor: pointer;
  }
  .load-more:active { background: var(--line-soft); }

  mark { background: var(--amber-soft); color: var(--navy-deep); border-radius: 2px; padding: 0 1px; }

  /* Edit toolbar in header */
  .toolbar-row { display: flex; gap: 8px; margin-top: 10px; }
  .tb-btn {
    flex: 1; font-size: 12.5px; font-weight: 600; padding: 8px 6px;
    border-radius: 8px; border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.08); color: #E7EEF3; cursor: pointer;
    text-align: center;
  }
  .tb-btn:active { background: rgba(255,255,255,0.16); }
  .tb-btn.primary { background: var(--amber); border-color: var(--amber); color: #201202; }

  /* Edit / add badges */
  .rec-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 20px; margin-left: 6px;
    vertical-align: middle; letter-spacing: 0.02em;
  }
  .rec-badge.edited { background: #E1EEE0; color: #2C6E2F; }
  .rec-badge.added { background: #DCEAF6; color: #1C5A8A; }

  /* Detail action row */
  .detail-actions {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .act-btn {
    flex: 1; padding: 9px; border-radius: 8px; font-size: 13px; font-weight: 600;
    border: 1px solid var(--line); background: var(--paper); color: var(--navy); cursor: pointer;
  }
  .act-btn:active { background: var(--line-soft); }
  .act-btn.danger { color: #B23B2E; border-color: #EAC6C0; background: #FBF0EE; }
  .act-btn.save { background: var(--navy); color: #fff; border-color: var(--navy); }
  .act-btn.ghost { background: transparent; }

  /* Edit form */
  .edit-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px;
    margin-top: 10px;
  }
  .edit-item label {
    display: block; font-size: 10px; color: var(--ink-soft); letter-spacing: 0.03em;
    margin-bottom: 3px; text-transform: uppercase;
  }
  .edit-item input {
    width: 100%; padding: 8px 9px; font-size: 14px;
    border: 1px solid var(--line); border-radius: 7px;
    background: #fff; color: var(--ink); font-family: var(--mono);
  }
  .edit-item input:focus { outline: none; border-color: var(--navy); }

  /* Add-new panel */
  .add-panel {
    display: none;
    background: var(--card); border: 1.5px dashed var(--navy);
    border-radius: 10px; padding: 13px; margin-bottom: 10px;
  }
  .add-panel.open { display: block; }
  .add-panel h3 { margin: 0 0 4px; font-size: 14px; color: var(--navy); }
  .add-panel .hint { font-size: 11.5px; color: var(--ink-soft); margin: 0 0 4px; }

  .footnote {
    font-size: 11px; color: var(--ink-soft); text-align: center;
    padding: 14px 20px 4px; line-height: 1.7;
  }
</style>
</head>
<body>

<header>
  <div class="title-row">
    <h1><span class="mark">#</span>納入実績検索</h1>
    <span class="count-badge" id="totalBadge"></span>
  </div>
  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="機番・機種・ユーザー名・代理店などで検索" autocomplete="off" autocapitalize="off" autocorrect="off">
    <button class="clear-btn" id="clearBtn">&times;</button>
  </div>
  <button class="filter-toggle" id="filterToggle">
    <span class="chev">&#9656;</span> 詳細フィルター <span class="active-dot"></span>
  </button>
  <div class="filters" id="filters">
    <div>
      <label>代理店 (Agent)</label>
      <select id="fAgent"><option value="">すべて</option></select>
    </div>
    <div>
      <label>国 (Country)</label>
      <select id="fCountry"><option value="">すべて</option></select>
    </div>
    <div>
      <label>機種 (Model)</label>
      <select id="fModel"><option value="">すべて</option></select>
    </div>
    <div>
      <label>年 (Year)</label>
      <select id="fYear"><option value="">すべて</option></select>
    </div>
    <div class="reset-row"><button id="resetFilters">条件をリセット</button></div>
  </div>
  <div class="toolbar-row">
    <button class="tb-btn primary" id="addNewBtn">＋ 新規登録</button>
    <button class="tb-btn" id="exportBtn">データを書き出す</button>
    <button class="tb-btn" id="discardEditsBtn">編集を破棄</button>
  </div>
</header>

<main>
  <div class="add-panel" id="addPanel">
    <h3>新規レコードを登録</h3>
    <p class="hint">この端末のブラウザ内に保存されます。ほかの端末とは共有されません。</p>
    <div class="edit-grid" id="addGrid"></div>
    <div class="detail-actions">
      <button class="act-btn ghost" id="addCancelBtn">キャンセル</button>
      <button class="act-btn save" id="addSaveBtn">登録する</button>
    </div>
  </div>
  <div class="result-meta" id="resultMeta"></div>
  <div id="results"></div>
  <button class="load-more" id="loadMoreBtn" style="display:none;"></button>
  <p class="footnote">編集・新規登録した内容はこの端末のブラウザにのみ保存されます。<br>他の端末やExcel本体には自動反映されません。「データを書き出す」からCSVとして取り出せます。</p>
</main>

    };
  } catch (e) {
    console.error('Store load error:', e);
    return { edits: {}, deleted: [], added: {} };
  }
}

function saveStore(store) {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(store));
    return true;
  } catch (e) {
    console.error('Store save error:', e);
    return false;
  }
}

let store = loadStore();

function getEffectiveList() {
  const list = [];
  ROWS.forEach((row, i) => {
    if (store.deleted.includes(i)) return;
    const r = store.edits[i] || row;
    list.push({ key: 'o' + i, row: r, isAdded: false, isEdited: !!store.edits[i] });
  });
  Object.keys(store.added).forEach(id => {
    list.push({ key: id, row: store.added[id], isAdded: true, isEdited: false });
  });
  return list;
}

const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
const resultsEl = document.getElementById('results');
const resultMetaEl = document.getElementById('resultMeta');
const loadMoreBtn = document.getElementById('loadMoreBtn');
const filterToggle = document.getElementById('filterToggle');
const filtersEl = document.getElementById('filters');

let isComposing = false;
searchInput.addEventListener('compositionstart', () => isComposing = true);
searchInput.addEventListener('compositionend', () => { isComposing = false; onQueryChange(); });

let debounceTimer = null;
function debouncedRender() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => { shown = PAGE_SIZE; render(); }, 120);
}

searchInput.addEventListener('input', () => {
  clearBtn.classList.toggle('show', searchInput.value.length > 0);
  if (!isComposing) debouncedRender();
});
function onQueryChange() { shown = PAGE_SIZE; render(); }

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.classList.remove('show');
  shown = PAGE_SIZE;
  render();

});

filterToggle.addEventListener('click', () => {
  filtersEl.classList.toggle('open');
  filterToggle.classList.toggle('open');
});

['fAgent','fCountry','fModel','fYear'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {

    render();
  });
});

document.getElementById('resetFilters').addEventListener('click', () => {
  ['fAgent','fCountry','fModel','fYear'].forEach(id => document.getElementById(id).value = '');
  updateFilterDot();

function updateFilterDot() {
  const active = ['fAgent','fCountry','fModel','fYear'].some(id => document.getElementById(id).value !== '');
  filterToggle.classList.toggle('has-active', active);
}

loadMoreBtn.addEventListener('click', () => {
  shown += PAGE_SIZE;
  render();
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// --- 半角カナ/全角カナを区別しないための正規化 ---
const KANA_MAP = {
  // 濁音(2文字→1文字)
  'ｶﾞ':'ガ','ｷﾞ':'ギ','ｸﾞ':'グ','ｹﾞ':'ゲ','ｺﾞ':'ゴ',
  'ｻﾞ':'ザ','ｼﾞ':'ジ','ｽﾞ':'ズ','ｾﾞ':'ゼ','ｿﾞ':'ゾ',
  'ﾀﾞ':'ダ','ﾁﾞ':'ヂ','ﾂﾞ':'ヅ','ﾃﾞ':'デ','ﾄﾞ':'ド',
  'ﾊﾞ':'バ','ﾋﾞ':'ビ','ﾌﾞ':'ブ','ﾍﾞ':'ベ','ﾎﾞ':'ボ',
  'ｳﾞ':'ヴ',
  // 半濁音(2文字→1文字)
  'ﾊﾟ':'パ','ﾋﾟ':'ピ','ﾌﾟ':'プ','ﾍﾟ':'ペ','ﾎﾟ':'ポ',
  // 単独(1文字→1文字)
  'ｦ':'ヲ','ｧ':'ァ','ｨ':'ィ','ｩ':'ゥ','ｪ':'ェ','ｫ':'ォ','ｬ':'ャ','ｭ':'ュ','ｮ':'ョ','ｯ':'ッ',
  'ｰ':'ー','ｱ':'ア','ｲ':'イ','ｳ':'ウ','ｴ':'エ','ｵ':'オ',
  'ｶ':'カ','ｷ':'キ','ｸ':'ク','ｹ':'ケ','ｺ':'コ',
  'ｻ':'サ','ｼ':'シ','ｽ':'ス','ｾ':'セ','ｿ':'ソ',
  'ﾀ':'タ','ﾁ':'チ','ﾂ':'ツ','ﾃ':'テ','ﾄ':'ト',
  'ﾅ':'ナ','ﾆ':'ニ','ﾇ':'ヌ','ﾈ':'ネ','ﾉ':'ノ',
  'ﾊ':'ハ','ﾋ':'ヒ','ﾌ':'フ','ﾍ':'ヘ','ﾎ':'ホ',
  'ﾏ':'マ','ﾐ':'ミ','ﾑ':'ム','ﾒ':'メ','ﾓ':'モ',
  'ﾔ':'ヤ','ﾕ':'ユ','ﾖ':'ヨ',
  'ﾗ':'ラ','ﾘ':'リ','ﾙ':'ル','ﾚ':'レ','ﾛ':'ロ',
  'ﾜ':'ワ','ﾝ':'ン','ﾞ':'゛','ﾟ':'゜','｡':'。','｢':'「','｣':'」','､':'、','･':'・'
};
const KANA_KEYS_SORTED = Object.keys(KANA_MAP).sort((a, b) => b.length - a.length);
const KANA_REGEX = new RegExp(KANA_KEYS_SORTED.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|'), 'g');

// 高速版: 比較専用(文字位置の対応は取らない)。フィルタリングのhaystack/queryの正規化に使う。
function normalizeForCompare(str) {
  return String(str).replace(KANA_REGEX, ch => KANA_MAP[ch]).toLowerCase();
}

// 精密版: 元テキストの文字位置に対応するマップも返す。ハイライト表示に使う。
function normalizeWithMap(str) {
  const s = String(str);
  let norm = '';
  const map = [];
  let i = 0;
  while (i < s.length) {
    const two = s.substr(i, 2);
    if (KANA_MAP[two]) {
      norm += KANA_MAP[two];
      map.push({ start: i, len: 2 });
      i += 2;
    } else {
      const one = s[i];
      norm += (KANA_MAP[one] || one);
      map.push({ start: i, len: 1 });
      i += 1;
    }
  }
  return { norm, map };
}

function highlight(text, q) {
  const s = String(text);
  if (!q) return escapeHtml(s);
  const { norm, map } = normalizeWithMap(s);
  const normLower = norm.toLowerCase();
  const qNorm = normalizeForCompare(q);
  const idx = normLower.indexOf(qNorm);
  if (idx === -1 || map.length === 0) return escapeHtml(s);
  const endNormIdx = idx + qNorm.length - 1;
  const start = map[idx].start;
  const end = map[endNormIdx].start + map[endNormIdx].len;
  return escapeHtml(s.slice(0, start)) + '<mark>' + escapeHtml(s.slice(start, end)) + '</mark>' + escapeHtml(s.slice(end));
}

function filterRows() {
  const q = normalizeForCompare(searchInput.value.trim());
  const fAgent = document.getElementById('fAgent').value;
  const fCountry = document.getElementById('fCountry').value;
  const fModel = document.getElementById('fModel').value;
  const fYear = document.getElementById('fYear').value;

  return getEffectiveList().filter(entry => {
    const r = entry.row;
    if (fAgent && r[1] !== fAgent) return false;
    if (fCountry && r[8] !== fCountry) return false;
    if (fModel && r[5] !== fModel) return false;
    if (fYear && String(r[9]) !== fYear) return false;
    if (q) {
      const hay = normalizeForCompare(r.join(' '));
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

const FIELD_LABELS = ['Serial No.', 'Agent', 'Machine', 'Machine No.', 'User Name', 'Model', 'Ch No', 'Servo', 'Country', 'Year'];
let editingKey = null;

function safeId(key) { return key.replace(/[^a-zA-Z0-9_-]/g, '_'); }

function editGridHtml(prefix, values) {
  return FIELD_LABELS.map((label, i) => `
    <div class="edit-item">
      <label>${escapeHtml(label)}</label>
      <input type="text" id="${prefix}-f${i}" value="${escapeHtml(values ? (values[i] ?? '') : '')}">
    </div>`).join('');
}

function readEditGrid(prefix) {
  return FIELD_LABELS.map((_, i) => {
    const el = document.getElementById(`${prefix}-f${i}`);
    let v = el ? el.value.trim() : '';
    if (i === 6 || i === 9) { // Ch No, Year: numeric when possible
      if (v !== '' && !isNaN(v)) v = Number(v);
    }
    return v;
  });
}

function cardHtml(entry, q) {
  const { key, row, isAdded, isEdited } = entry;
  const [serial, agent, machine, machineNo, user, model, chNo, servo, country, year] = row;
  const machineLine = [machine, model].filter(Boolean).join(' / ') || '(機種不明)';
  const isOpen = key === openCardKey;
  const isEditing = key === editingKey;
  const badge = isAdded ? '<span class="rec-badge added">新規</span>' : (isEdited ? '<span class="rec-badge edited">編集済み</span>' : '');
  const pid = safeId(key);

  const detailBody = isEditing ? `
        <div class="edit-grid">${editGridHtml(pid, row)}</div>
        <div class="detail-actions">
          <button class="act-btn ghost" onclick="cancelEdit(event)">キャンセル</button>
          <button class="act-btn save" onclick="saveEdit('${key}', event)">保存</button>
        </div>` : `
        <div class="detail-grid">
          <div class="detail-item"><dt>Serial No.</dt><dd>${escapeHtml(serial || '-')}</dd></div>
          <div class="detail-item"><dt>Agent</dt><dd>${escapeHtml(agent || '-')}</dd></div>
          <div class="detail-item"><dt>Machine</dt><dd>${escapeHtml(machine || '-')}</dd></div>
          <div class="detail-item"><dt>Machine No.</dt><dd>${escapeHtml(machineNo || '-')}</dd></div>
          <div class="detail-item"><dt>User Name</dt><dd>${escapeHtml(user || '-')}</dd></div>
          <div class="detail-item"><dt>Model</dt><dd>${escapeHtml(model || '-')}</dd></div>
          <div class="detail-item"><dt>Ch No</dt><dd>${escapeHtml(chNo || '-')}</dd></div>
          <div class="detail-item"><dt>Servo</dt><dd>${escapeHtml(servo || '-')}</dd></div>
          <div class="detail-item"><dt>Country</dt><dd>${escapeHtml(country || '-')}</dd></div>
          <div class="detail-item"><dt>Year</dt><dd>${escapeHtml(year || '-')}</dd></div>
        </div>
        <div class="detail-actions">
          <button class="act-btn" onclick="startEdit('${key}', event)">編集</button>
          <button class="act-btn danger" onclick="deleteRecord('${key}', event)">削除</button>
        </div>`;

  return `
    <div class="card" data-key="${key}">
      <div class="card-head" onclick="toggleCard('${key}')">
        <div class="card-main">
          <div class="card-serial">${highlight(serial || '-', q)}${badge}</div>
          <div class="card-user">${highlight(user || '(ユーザー名なし)', q)}</div>
          <div class="card-machine-row">
            <div class="card-machine">${highlight(machineLine, q)}</div>
            ${chNo ? `<div class="card-chno">${highlight(String(chNo), q)}ch</div>` : ''}
          </div>
          <div class="card-sub">${highlight(country || '—', q)}</div>
        </div>
        <div class="card-year">${year || '-'}</div>
      </div>
      <div class="card-detail ${isOpen ? 'open' : ''}">${detailBody}</div>
    </div>`;
}

window.toggleCard = function(key) {
  if (editingKey === key) return;
  openCardKey = (openCardKey === key) ? null : key;
  editingKey = null;
  render();
};

window.startEdit = function(key, event) {
  if (event) event.stopPropagation();
  editingKey = key;
  openCardKey = key;
  render();
};

window.cancelEdit = function(event) {
  if (event) event.stopPropagation();
  editingKey = null;
  render();
};

window.saveEdit = function(key, event) {
  if (event) event.stopPropagation();
  const pid = safeId(key);
  const newRow = readEditGrid(pid);
  if (key.startsWith('o')) {
    const origIdx = parseInt(key.slice(1), 10);
    store.edits[origIdx] = newRow;
  } else {
    store.added[key] = newRow;
  }
  saveStore(store);
  editingKey = null;
  render();
};

window.deleteRecord = function(key, event) {
  if (event) event.stopPropagation();
  if (!confirm('この納入実績を削除しますか?(この端末の表示から削除されます)')) return;
  if (key.startsWith('o')) {
    const origIdx = parseInt(key.slice(1), 10);
    if (!store.deleted.includes(origIdx)) store.deleted.push(origIdx);
  } else {
    delete store.added[key];
  }
  saveStore(store);
  if (openCardKey === key) openCardKey = null;
  render();
};

document.getElementById('discardEditsBtn').addEventListener('click', () => {
  if (!confirm('この端末に保存したすべての編集・新規登録・削除を破棄しますか?元のデータに戻ります。')) return;
  store = { edits: {}, deleted: [], added: {} };
  saveStore(store);
  render();
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const rows = getEffectiveList().map(e => e.row);
  const csvLines = [HEADERS.join(',')];
  rows.forEach(r => {
    csvLines.push(r.map(v => {
      const s = String(v ?? '');
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }).join(','));
  });
  const csv = '\uFEFF' + csvLines.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
  a.href = url;
  a.download = `納入実績_${today}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

const addPanel = document.getElementById('addPanel');
const addGrid = document.getElementById('addGrid');
document.getElementById('addNewBtn').addEventListener('click', () => {
  addGrid.innerHTML = editGridHtml('add', null);
  addPanel.classList.add('open');
  addPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
});
document.getElementById('addCancelBtn').addEventListener('click', () => {
  addPanel.classList.remove('open');
});
document.getElementById('addSaveBtn').addEventListener('click', () => {
  const newRow = readEditGrid('add');
  if (!newRow.some(v => v !== '')) { alert('少なくとも1項目は入力してください'); return; }
  const id = 'a' + Date.now() + Math.random().toString(36).slice(2, 7);
  store.added[id] = newRow;
  saveStore(store);
  addPanel.classList.remove('open');
  shown = PAGE_SIZE;
  render();
});

function render() {
  const q = searchInput.value.trim();
  const filtered = filterRows();

  if (filtered.length === 0) {
    resultMetaEl.textContent = '';
    resultsEl.innerHTML = `
      <div class="empty-state">
        <div class="big">&#128269;</div>
        <p>該当する納入実績が見つかりません</p>
        <p>検索語やフィルターを見直してください</p>
      </div>`;
    loadMoreBtn.style.display = 'none';
    return;
  }

  const visible = filtered.slice(0, shown);
  resultMetaEl.textContent = `${filtered.length.toLocaleString()}件中 ${visible.length.toLocaleString()}件を表示`;
  resultsEl.innerHTML = visible.map((entry) => cardHtml(entry, q)).join('');

  if (filtered.length > shown) {
    loadMoreBtn.style.display = 'block';
    loadMoreBtn.textContent = `さらに読み込む (残り ${(filtered.length - shown).toLocaleString()}件)`;
  } else {
    loadMoreBtn.style.display = 'none';
  }
}

// initial state: show most recent entries first as a starting point
resultMetaEl.textContent = `全 ${ROWS.length.toLocaleString()}件 — 検索語かフィルターを指定してください`;
resultsEl.innerHTML = `
  <div class="empty-state">
    <div class="big">&#128736;</div>
    <p>機番・ユーザー名・国・機種などで検索できます</p>
    <p>または上の「詳細フィルター」で絞り込んでください</p>
  </div>`;
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(() => {});
  });
}
</script>
